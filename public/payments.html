<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SageConnect - Pagos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
        crossorigin="anonymous"></script>
</head>

<style>
    body {
        background: #f0f2f5;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        margin: 0;
    }

    .category-card {
        cursor: pointer;
        transition: all 0.25s ease;
        border-width: 2px;
    }

    .category-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
    }

    .category-card.active {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }

    .category-card.active.border-success { background-color: rgba(25, 135, 84, 0.1); }
    .category-card.active.border-warning { background-color: rgba(255, 193, 7, 0.1); }
    .category-card.active.border-danger { background-color: rgba(220, 53, 69, 0.1); }
    .category-card.active.border-secondary { background-color: rgba(108, 117, 125, 0.1); }
    .category-card.active.border-info { background-color: rgba(13, 202, 240, 0.1); }

    .payment-row {
        cursor: pointer;
    }

    .payment-row .chevron-icon {
        transition: transform 0.25s ease;
    }

    .payment-row[aria-expanded="true"] .chevron-icon {
        transform: rotate(90deg);
    }

    .detail-row td {
        padding: 0 !important;
        border: 0 !important;
    }

    .text-monospace {
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 0.82rem;
    }

    .badge-category {
        font-size: 0.75rem;
    }

    .loading-overlay {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 300px;
    }

    .page-header {
        background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
        color: white;
        padding: 1.5rem 2rem;
        border-radius: 0 0 12px 12px;
    }
</style>

<body>
    <!-- Sidebar + Content wrapper -->
    <div class="d-flex">
        <!-- Sidebar injected by shared.js -->
        <div id="sidebar"></div>

        <!-- Main content area -->
        <div class="flex-grow-1" style="min-height: 100vh;">

            <!-- Toast container -->
            <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100;"></div>

            <!-- Page header -->
            <div class="page-header d-flex align-items-center justify-content-between">
                <div>
                    <h4 class="mb-0"><i class="fas fa-credit-card me-2"></i>Pagos</h4>
                    <small class="opacity-75">Auditoria de conciliacion de pagos</small>
                </div>
                <button id="btnRunReconciliation" class="btn btn-outline-light btn-sm" onclick="loadPaymentsData()">
                    <i class="fas fa-sync-alt me-1"></i>Ejecutar Conciliacion
                </button>
            </div>

            <!-- Content -->
            <div class="container-fluid p-4">

                <!-- Loading state -->
                <div id="loadingOverlay" class="loading-overlay">
                    <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;">
                        <span class="visually-hidden">Cargando...</span>
                    </div>
                    <p class="text-muted">Ejecutando conciliacion de pagos...</p>
                </div>

                <!-- Main content (hidden until data loads) -->
                <div id="mainContent" style="display: none;">

                    <!-- Summary Cards -->
                    <div id="categoryCards" class="row row-cols-1 row-cols-md-3 row-cols-lg-5 g-3 mb-4"></div>

                    <!-- Results info -->
                    <div id="resultsInfo" class="text-muted mb-3"></div>

                    <!-- Action buttons -->
                    <div class="d-flex flex-wrap gap-2 mb-4">
                        <button id="btnUpload" class="btn btn-success btn-sm" onclick="uploadReadyPayments()" disabled>
                            <i class="fas fa-upload me-1"></i>Subir Pagos Listos
                        </button>
                        <button id="btnScanUuid" class="btn btn-warning btn-sm" onclick="scanRepairableUuids()">
                            <i class="fas fa-search me-1"></i>Escanear UUIDs Reparables
                        </button>
                        <button id="btnRepairUuid" class="btn btn-danger btn-sm" onclick="repairUuids()">
                            <i class="fas fa-wrench me-1"></i>Reparar UUIDs
                        </button>
                        <button id="btnViewCfdis" class="btn btn-info btn-sm text-white" onclick="viewCfdis()">
                            <i class="fas fa-file-invoice me-1"></i>Ver CFDIs Tipo P
                        </button>
                    </div>

                    <!-- Scan results (inline) -->
                    <div id="scanResults" class="mb-3" style="display: none;"></div>

                    <!-- CFDIs section (collapsible) -->
                    <div id="cfdisSection" class="mb-4" style="display: none;">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center bg-info text-white">
                                <span><i class="fas fa-file-invoice me-2"></i>CFDIs Tipo P</span>
                                <button class="btn btn-sm btn-outline-light" onclick="document.getElementById('cfdisSection').style.display='none'">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                            <div class="card-body p-0">
                                <div id="cfdisTableContainer" class="table-responsive"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Payment table -->
                    <div class="card">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center">
                            <span class="fw-semibold"><i class="fas fa-table me-2"></i>Detalle de Pagos</span>
                            <span id="tableFilterInfo" class="badge bg-secondary" style="display: none;"></span>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0" id="paymentTable">
                                    <thead class="table-light">
                                        <tr>
                                            <th style="width: 30px;"></th>
                                            <th>No. Pago</th>
                                            <th>Proveedor</th>
                                            <th>Monto</th>
                                            <th>Moneda</th>
                                            <th>Categoria</th>
                                            <th>Facturas</th>
                                        </tr>
                                    </thead>
                                    <tbody id="paymentTableBody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- UUID Diagnostic Section -->
                    <div class="card mt-4">
                        <div class="card-header bg-white">
                            <span class="fw-semibold"><i class="fas fa-stethoscope me-2"></i>Diagnostico UUID</span>
                        </div>
                        <div class="card-body">
                            <div class="row g-2 align-items-end">
                                <div class="col-auto">
                                    <label for="diagnosticDocNbr" class="form-label small text-muted">Numero de documento (ej. PY0001)</label>
                                    <input type="text" id="diagnosticDocNbr" class="form-control form-control-sm" placeholder="PY0001"
                                        onkeydown="if(event.key==='Enter') runDiagnostic()">
                                </div>
                                <div class="col-auto">
                                    <button class="btn btn-sm btn-primary" onclick="runDiagnostic()">
                                        <i class="fas fa-search me-1"></i>Buscar
                                    </button>
                                </div>
                            </div>
                            <div id="diagnosticResult" class="mt-3"></div>
                        </div>
                    </div>

                </div><!-- /mainContent -->

            </div><!-- /container-fluid -->

        </div><!-- /flex-grow-1 -->
    </div><!-- /d-flex -->

    <!-- Shared JS (sidebar, API helper, tenant state, toast, formatters) -->
    <script src="/js/shared.js"></script>

    <script>
        /* ==================================================================
         * State
         * ================================================================== */

        let reconciliationData = null;
        let activeFilter = null;

        const CATEGORY_META = {
            ready:              { label: 'Listos',                icon: 'fa-check-circle',  color: 'success' },
            no_providerid:      { label: 'Sin PROVIDERID',        icon: 'fa-user-slash',    color: 'warning' },
            no_uuid:            { label: 'Sin UUID',              icon: 'fa-fingerprint',   color: 'danger' },
            not_in_portal:      { label: 'No en Portal',          icon: 'fa-cloud',         color: 'secondary' },
            provider_mismatch:  { label: 'Proveedor No Coincide', icon: 'fa-exchange-alt',  color: 'info' }
        };

        /* ==================================================================
         * Page Init
         * ================================================================== */

        document.addEventListener('DOMContentLoaded', async () => {
            await initPage('/payments.html');
            loadPaymentsData();
        });

        window.onTenantChange = () => loadPaymentsData();

        /* ==================================================================
         * Data Loading
         * ================================================================== */

        async function loadPaymentsData() {
            // Show loading, hide content
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('btnRunReconciliation').disabled = true;

            try {
                const res = await apiCall('POST', '/api/payments/reconciliation', {
                    tenantIndex: getTenantIndex(),
                    includeDetails: true
                });

                if (!res.success) {
                    showToast('Error en conciliacion: ' + (res.summary || res.message || 'Error desconocido'), 'error');
                    return;
                }

                reconciliationData = res.data;
                activeFilter = null;

                renderCategoryCards(reconciliationData.categories);
                renderPaymentTable(reconciliationData.details, null);
                updateResultsInfo();

                // Enable upload button if there are ready payments
                document.getElementById('btnUpload').disabled = (reconciliationData.categories.ready === 0);

            } catch (err) {
                showToast('Error de conexion al ejecutar conciliacion', 'error');
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('btnRunReconciliation').disabled = false;
            }
        }

        /* ==================================================================
         * Results Info
         * ================================================================== */

        function updateResultsInfo() {
            if (!reconciliationData) return;
            const cats = reconciliationData.categories;
            const total = (cats.ready || 0) + (cats.no_providerid || 0) + (cats.no_uuid || 0)
                        + (cats.not_in_portal || 0) + (cats.provider_mismatch || 0);

            const tenantIdx = getTenantIndex();
            const tenantName = window.__TENANTS__[tenantIdx]
                ? window.__TENANTS__[tenantIdx].name
                : 'Tenant ' + tenantIdx;

            document.getElementById('resultsInfo').innerHTML =
                `<i class="fas fa-info-circle me-1"></i>Total: <strong>${total}</strong> pagos | ` +
                `Portal: <strong>${reconciliationData.portalInvoiceCount || 0}</strong> facturas | ` +
                `Sage: <strong>${reconciliationData.sagePaymentCount || 0}</strong> pagos | ` +
                `Tenant: <strong>${tenantName}</strong>`;
        }

        /* ==================================================================
         * Category Cards
         * ================================================================== */

        function renderCategoryCards(categories) {
            const container = document.getElementById('categoryCards');
            let html = '';

            for (const [key, meta] of Object.entries(CATEGORY_META)) {
                const count = categories[key] || 0;
                const isActive = activeFilter === key;
                html += `
                    <div class="col">
                        <div class="card category-card border-${meta.color} ${isActive ? 'active' : ''}"
                             role="button" onclick="filterByCategory('${key}')">
                            <div class="card-body text-center py-3">
                                <i class="fas ${meta.icon} text-${meta.color} fs-4 mb-1"></i>
                                <div class="fs-2 fw-bold text-${meta.color}">${count}</div>
                                <small class="text-muted">${meta.label}</small>
                            </div>
                        </div>
                    </div>`;
            }

            container.innerHTML = html;
        }

        /* ==================================================================
         * Category Filtering
         * ================================================================== */

        function filterByCategory(key) {
            if (activeFilter === key) {
                // Toggle off
                activeFilter = null;
            } else {
                activeFilter = key;
            }
            renderCategoryCards(reconciliationData.categories);
            renderPaymentTable(reconciliationData.details, activeFilter);

            const badge = document.getElementById('tableFilterInfo');
            if (activeFilter) {
                const meta = CATEGORY_META[activeFilter];
                badge.textContent = 'Filtro: ' + meta.label;
                badge.className = 'badge bg-' + meta.color;
                badge.style.display = 'inline';
            } else {
                badge.style.display = 'none';
            }
        }

        function clearFilter() {
            activeFilter = null;
            renderCategoryCards(reconciliationData.categories);
            renderPaymentTable(reconciliationData.details, null);
            document.getElementById('tableFilterInfo').style.display = 'none';
        }

        /* ==================================================================
         * Payment Table
         * ================================================================== */

        function renderPaymentTable(details, filter) {
            const tbody = document.getElementById('paymentTableBody');

            if (!details) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">Sin datos de conciliacion</td></tr>';
                return;
            }

            // Flatten all categories into one list, tagging each with its category key
            const allPayments = [];
            for (const [catKey, items] of Object.entries(details)) {
                if (!Array.isArray(items)) continue;
                for (const item of items) {
                    allPayments.push({ ...item, _category: catKey });
                }
            }

            // Apply filter
            const filtered = filter ? allPayments.filter(p => p._category === filter) : allPayments;

            if (!filtered.length) {
                const msg = filter
                    ? 'No hay pagos en la categoria "' + (CATEGORY_META[filter]?.label || filter) + '"'
                    : 'No se encontraron pagos';
                tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4">${msg}</td></tr>`;
                return;
            }

            let html = '';
            for (let i = 0; i < filtered.length; i++) {
                const p = filtered[i];
                const hdr = p.hdr || {};
                const meta = CATEGORY_META[p._category] || { label: p._category, color: 'secondary' };
                const invoices = p.invoices || [];
                const invoiceCount = invoices.length || 0;
                const detailId = 'detail-' + (hdr.external_id || i).replace(/[^a-zA-Z0-9]/g, '_') + '_' + i;

                // Format amount
                const amount = formatCurrency(hdr.total_amount);

                // Main row
                html += `
                    <tr class="payment-row" data-category="${p._category}"
                        data-bs-toggle="collapse" data-bs-target="#${detailId}"
                        aria-expanded="false" role="button" style="cursor:pointer">
                        <td><i class="fas fa-chevron-right chevron-icon text-muted small"></i></td>
                        <td class="fw-semibold">${hdr.external_id || '-'}</td>
                        <td>${hdr.provider_external_id || '-'}</td>
                        <td>${amount}</td>
                        <td>${hdr.bk_currency || '-'}</td>
                        <td><span class="badge bg-${meta.color} badge-category">${meta.label}</span></td>
                        <td>${invoiceCount}</td>
                    </tr>`;

                // Detail row (collapsed by default)
                html += `
                    <tr class="detail-row">
                        <td colspan="7">
                            <div class="collapse" id="${detailId}">
                                <div class="p-3 bg-light border-top">`;

                // Category-specific detail content
                if (p._category === 'no_providerid') {
                    // Show reason instead of invoice table
                    html += `
                                    <div class="alert alert-warning mb-0 py-2">
                                        <i class="fas fa-exclamation-triangle me-2"></i>
                                        <strong>Razon:</strong> ${escapeHtml(p.reason || 'Sin PROVIDERID asignado')}
                                        ${hdr.RFC ? '<br><small class="text-muted">RFC: ' + escapeHtml(hdr.RFC) + '</small>' : ''}
                                    </div>`;
                } else if (invoices.length > 0) {
                    html += `
                                    <h6 class="mb-2"><i class="fas fa-file-invoice me-1"></i>Facturas del Pago ${escapeHtml(hdr.external_id || '')}</h6>
                                    <table class="table table-sm table-bordered mb-0">
                                        <thead class="table-light">
                                            <tr>
                                                <th>Factura</th>
                                                <th>UUID</th>
                                                <th>Monto</th>
                                                <th>Moneda</th>
                                                <th>Estado</th>
                                            </tr>
                                        </thead>
                                        <tbody>`;

                    for (const inv of invoices) {
                        const uuid = inv.UUID || '';
                        const shortUuid = uuid.length > 20 ? uuid.substring(0, 8) + '...' + uuid.substring(uuid.length - 8) : uuid;
                        const paidBadge = inv.FULL_PAID
                            ? '<span class="badge bg-success">Pagado</span>'
                            : '<span class="badge bg-warning text-dark">Parcial</span>';

                        html += `
                                            <tr>
                                                <td>${escapeHtml(inv.invoice_external_id || '-')}</td>
                                                <td class="text-monospace small" title="${escapeHtml(uuid)}">${escapeHtml(shortUuid || '-')}</td>
                                                <td>${formatCurrency(inv.invoice_amount || inv.payment_amount)}</td>
                                                <td>${inv.invoice_currency || '-'}</td>
                                                <td>${paidBadge}</td>
                                            </tr>`;
                    }

                    html += `
                                        </tbody>
                                    </table>`;

                    // For no_uuid: show missing info
                    if (p._category === 'no_uuid' && (p.missingCount != null || p.totalCount != null)) {
                        html += `
                                    <div class="mt-2 text-muted small">
                                        <i class="fas fa-info-circle me-1"></i>
                                        UUIDs faltantes: ${p.missingCount || 0} de ${p.totalCount || 0} facturas
                                    </div>`;
                    }

                    // For provider_mismatch: show mismatch details
                    if (p._category === 'provider_mismatch' && p.mismatchDetails && p.mismatchDetails.length) {
                        html += `
                                    <div class="mt-2">
                                        <h6 class="text-danger mb-1"><i class="fas fa-exclamation-circle me-1"></i>Detalle de Desajuste</h6>
                                        <ul class="list-unstyled mb-0 small">`;
                        for (const md of p.mismatchDetails) {
                            html += `<li class="text-muted">${escapeHtml(typeof md === 'string' ? md : JSON.stringify(md))}</li>`;
                        }
                        html += `
                                        </ul>
                                    </div>`;
                    }

                } else {
                    html += `<p class="text-muted mb-0 small">Sin facturas asociadas</p>`;
                }

                html += `
                                </div>
                            </div>
                        </td>
                    </tr>`;
            }

            tbody.innerHTML = html;

            // Wire up chevron rotation via Bootstrap collapse events
            const collapseEls = tbody.querySelectorAll('.collapse');
            collapseEls.forEach(el => {
                el.addEventListener('show.bs.collapse', () => {
                    const row = el.closest('tr').previousElementSibling;
                    if (row) row.setAttribute('aria-expanded', 'true');
                });
                el.addEventListener('hide.bs.collapse', () => {
                    const row = el.closest('tr').previousElementSibling;
                    if (row) row.setAttribute('aria-expanded', 'false');
                });
            });
        }

        /* ==================================================================
         * Actions
         * ================================================================== */

        async function uploadReadyPayments() {
            if (!confirmAction('Subir pagos listos al portal? Esta accion no se puede deshacer.')) return;

            try {
                showToast('Subiendo pagos listos...', 'warning');
                const res = await apiCall('POST', '/api/payments/generate', {
                    tenantIndex: getTenantIndex(),
                    dryRun: false
                });

                if (res.success) {
                    showToast('Pagos subidos exitosamente', 'success');
                    loadPaymentsData(); // Refresh
                } else {
                    showToast('Error al subir pagos: ' + (res.summary || res.message || 'Error desconocido'), 'error');
                }
            } catch (err) {
                showToast('Error de conexion al subir pagos', 'error');
            }
        }

        async function scanRepairableUuids() {
            try {
                showToast('Escaneando UUIDs reparables...', 'warning');
                const res = await apiCall('POST', '/api/payments/uuid-repair/scan', {
                    tenantIndex: getTenantIndex()
                });

                const container = document.getElementById('scanResults');
                if (res.success) {
                    const items = res.data && Array.isArray(res.data) ? res.data : (res.data?.items || []);
                    const count = Array.isArray(items) ? items.length : 0;
                    container.innerHTML = `
                        <div class="alert alert-info py-2">
                            <i class="fas fa-info-circle me-2"></i>
                            <strong>${count}</strong> UUID(s) reparable(s) encontrado(s)
                            <button class="btn-close btn-sm float-end" onclick="this.closest('.alert').parentElement.style.display='none'"></button>
                        </div>`;
                    container.style.display = 'block';
                    showToast(count + ' UUID(s) reparable(s) encontrado(s)', 'success');
                } else {
                    showToast('Error al escanear: ' + (res.summary || res.message || 'Error'), 'error');
                }
            } catch (err) {
                showToast('Error de conexion al escanear UUIDs', 'error');
            }
        }

        async function repairUuids() {
            if (!confirmAction('Reparar UUIDs faltantes? Esto modificara registros en Sage.')) return;

            try {
                showToast('Reparando UUIDs...', 'warning');
                const res = await apiCall('POST', '/api/payments/uuid-repair/repair', {
                    tenantIndex: getTenantIndex(),
                    dryRun: false
                });

                if (res.success) {
                    showToast('Reparacion de UUIDs completada', 'success');
                    loadPaymentsData(); // Refresh
                } else {
                    showToast('Error al reparar UUIDs: ' + (res.summary || res.message || 'Error'), 'error');
                }
            } catch (err) {
                showToast('Error de conexion al reparar UUIDs', 'error');
            }
        }

        async function viewCfdis() {
            try {
                showToast('Cargando CFDIs Tipo P...', 'warning');
                const res = await apiCall('GET', '/api/payments/cfdis?tenantIndex=' + getTenantIndex());

                const section = document.getElementById('cfdisSection');
                const container = document.getElementById('cfdisTableContainer');

                if (res.success && res.data) {
                    const items = Array.isArray(res.data) ? res.data : (res.data.items || res.data.cfdis || []);

                    if (!items.length) {
                        container.innerHTML = '<div class="p-3 text-muted text-center">No se encontraron CFDIs Tipo P</div>';
                    } else {
                        let html = `
                            <table class="table table-sm table-striped mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Folio</th>
                                        <th>Serie</th>
                                        <th>UUID</th>
                                        <th>Total</th>
                                        <th>Moneda</th>
                                        <th>Proveedor</th>
                                    </tr>
                                </thead>
                                <tbody>`;

                        for (const cfdi of items) {
                            const c = cfdi.cfdi || cfdi;
                            const uuid = c.timbre?.uuid || c.UUID || cfdi.uuid || '-';
                            const shortUuid = uuid.length > 20 ? uuid.substring(0, 8) + '...' + uuid.substring(uuid.length - 8) : uuid;
                            html += `
                                <tr>
                                    <td>${c.folio || cfdi.folio || '-'}</td>
                                    <td>${c.serie || cfdi.serie || '-'}</td>
                                    <td class="text-monospace small" title="${escapeHtml(uuid)}">${escapeHtml(shortUuid)}</td>
                                    <td>${formatCurrency(c.total || cfdi.total)}</td>
                                    <td>${c.moneda || cfdi.moneda || cfdi.currency || '-'}</td>
                                    <td>${cfdi.metadata?.provider_id || cfdi.provider_id || '-'}</td>
                                </tr>`;
                        }

                        html += '</tbody></table>';
                        container.innerHTML = html;
                    }

                    section.style.display = 'block';
                    showToast(items.length + ' CFDI(s) Tipo P cargado(s)', 'success');
                } else {
                    showToast('Error al cargar CFDIs: ' + (res.summary || res.message || 'Error'), 'error');
                }
            } catch (err) {
                showToast('Error de conexion al cargar CFDIs', 'error');
            }
        }

        /* ==================================================================
         * UUID Diagnostic
         * ================================================================== */

        async function runDiagnostic() {
            const input = document.getElementById('diagnosticDocNbr');
            const docNbr = (input.value || '').trim();
            const resultDiv = document.getElementById('diagnosticResult');

            if (!docNbr) {
                showToast('Ingrese un numero de documento (ej. PY0001)', 'warning');
                return;
            }

            resultDiv.innerHTML = '<div class="text-center py-2"><div class="spinner-border spinner-border-sm text-primary"></div> Buscando...</div>';

            try {
                const res = await apiCall('GET', '/api/payments/uuid-diagnostic?docNbr=' + encodeURIComponent(docNbr) + '&tenantIndex=' + getTenantIndex());

                if (res.success && res.data) {
                    const d = res.data;
                    let html = `
                        <div class="card border-primary">
                            <div class="card-header bg-primary text-white py-2">
                                <i class="fas fa-file-medical-alt me-2"></i>Diagnostico: ${escapeHtml(docNbr)}
                            </div>
                            <div class="card-body">`;

                    // Display header info if available
                    if (d.header || d.hdr) {
                        const hdr = d.header || d.hdr;
                        html += `
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <small class="text-muted">Proveedor</small>
                                        <div class="fw-semibold">${escapeHtml(hdr.provider_external_id || hdr.IDVEND || '-')}</div>
                                    </div>
                                    <div class="col-md-3">
                                        <small class="text-muted">Monto</small>
                                        <div class="fw-semibold">${formatCurrency(hdr.total_amount || hdr.AMTRMIT)}</div>
                                    </div>
                                    <div class="col-md-3">
                                        <small class="text-muted">Moneda</small>
                                        <div class="fw-semibold">${hdr.bk_currency || '-'}</div>
                                    </div>
                                </div>`;
                    }

                    // Display invoices if available
                    if (d.invoices && d.invoices.length) {
                        html += `
                                <h6 class="mb-2">Facturas</h6>
                                <table class="table table-sm table-bordered mb-0">
                                    <thead class="table-light">
                                        <tr><th>Factura</th><th>UUID</th><th>Monto</th><th>Estado</th></tr>
                                    </thead>
                                    <tbody>`;
                        for (const inv of d.invoices) {
                            const uuid = inv.UUID || inv.uuid || '';
                            html += `
                                    <tr>
                                        <td>${escapeHtml(inv.invoice_external_id || inv.IDINVC || '-')}</td>
                                        <td class="text-monospace small">${escapeHtml(uuid || '-')}</td>
                                        <td>${formatCurrency(inv.invoice_amount || inv.AMTPAYM)}</td>
                                        <td>${inv.FULL_PAID ? '<span class="badge bg-success">Pagado</span>' : '<span class="badge bg-warning text-dark">Parcial</span>'}</td>
                                    </tr>`;
                        }
                        html += '</tbody></table>';
                    }

                    // Display diagnosis / status
                    if (d.diagnosis || d.status || d.message) {
                        html += `
                                <div class="alert alert-info mt-3 mb-0 py-2">
                                    <i class="fas fa-info-circle me-2"></i>${escapeHtml(d.diagnosis || d.status || d.message)}
                                </div>`;
                    }

                    // Show raw data for any additional fields
                    if (d.category) {
                        const meta = CATEGORY_META[d.category] || { label: d.category, color: 'secondary' };
                        html += `<div class="mt-2"><span class="badge bg-${meta.color}">${meta.label}</span></div>`;
                    }

                    html += `
                            </div>
                        </div>`;

                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = `
                        <div class="alert alert-warning py-2 mb-0">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            ${escapeHtml(res.summary || res.message || 'No se encontro informacion para ' + docNbr)}
                        </div>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `
                    <div class="alert alert-danger py-2 mb-0">
                        <i class="fas fa-times-circle me-2"></i>Error al buscar diagnostico
                    </div>`;
            }
        }

        /* ==================================================================
         * Utilities
         * ================================================================== */

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = String(str);
            return div.innerHTML;
        }
    </script>

</body>

</html>
